# yaml-language-server: $schema=../schemas/model-config.schema.json
# Tier 1 — cheap & fast (see docs/modal-llm-deployment-recommendation.md)
app_name: "coder-fast"

model:
  name: "Qwen/Qwen2.5-Coder-7B-Instruct"
  served_name: "llm"

gpu:
  type: "L4"
  count: 1

scaling:
  scaledown_window_minutes: 2
  timeout_minutes: 10
  max_concurrent_inputs: 4
  fast_boot: false

vllm_args:
  async_scheduling: true
  extra_args:
    - "--max-model-len"
    - "32768"
    - "--enable-prefix-caching"

image:
  base: "nvidia/cuda:12.9.0-devel-ubuntu22.04"
  python: "3.12"
  env:
    HF_XET_HIGH_PERFORMANCE: "1"
