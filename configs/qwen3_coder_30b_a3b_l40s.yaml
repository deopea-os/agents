# yaml-language-server: $schema=../schemas/model-config.schema.json
# Tier 1 — Fast: speed + 128K agentic context (see docs/modal-llm-deployment-recommendation.md)
app_name: "coder-fast"

model:
  name: "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8"
  served_name: "coder-fast"

gpu:
  type: "L40S"
  count: 1

scaling:
  scaledown_window_minutes: 2
  timeout_minutes: 10
  max_concurrent_inputs: 4
  fast_boot: false

vllm_args:
  async_scheduling: true
  extra_args:
    - "--max-model-len"
    - "131072"
    - "--enable-expert-parallel"
    - "--enable-auto-tool-choice"
    - "--tool-call-parser"
    - "qwen3_coder"
    - "--enable-prefix-caching"

image:
  base: "nvidia/cuda:12.9.0-devel-ubuntu22.04"
  python: "3.12"
  env:
    HF_XET_HIGH_PERFORMANCE: "1"
